name: Main Extension Distribution Pipeline
on:
  push:
    tags:
      - "*"
  pull_request:
    paths:
      - "CMakeLists.txt"
      - "Makefile"
      - "extension_config.cmake"
      - "vcpkg.json"
      - ".github/workflows/Distribution.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5-variegata
      ci_tools_version: v1.5-variegata
      extension_name: lance
      extra_toolchains: "rust"
      exclude_archs: "wasm_mvp;wasm_eh;wasm_threads;windows_amd64_mingw;osx_amd64"
